name: Publish npm

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Kiri version to publish, without the leading v"
        required: true
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm packages
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          package-manager-cache: false

      - name: Download release npm assets
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          base_url="https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}"
          assets=(
            "kiri-npm-${VERSION}.tgz"
            "kiri-npm-darwin-arm64-${VERSION}.tgz"
            "kiri-npm-darwin-x64-${VERSION}.tgz"
            "kiri-npm-linux-x64-${VERSION}.tgz"
            "kiri-npm-win32-x64-${VERSION}.tgz"
            "checksums.txt"
          )
          for asset in "${assets[@]}"; do
            curl --fail --silent --show-error --location --retry 3 \
              --output "dist/${asset}" \
              "${base_url}/${asset}"
          done
          cd dist
          awk '$2 ~ /^kiri-npm-/ { print }' checksums.txt > npm-checksums.txt
          shasum -a 256 -c npm-checksums.txt

      - name: Publish platform packages
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          npm publish "./dist/kiri-npm-darwin-arm64-${VERSION}.tgz" \
            --tag darwin-arm64 \
            --access public \
            --provenance \
            --registry https://registry.npmjs.org/
          npm publish "./dist/kiri-npm-darwin-x64-${VERSION}.tgz" \
            --tag darwin-x64 \
            --access public \
            --provenance \
            --registry https://registry.npmjs.org/
          npm publish "./dist/kiri-npm-linux-x64-${VERSION}.tgz" \
            --tag linux-x64 \
            --access public \
            --provenance \
            --registry https://registry.npmjs.org/
          npm publish "./dist/kiri-npm-win32-x64-${VERSION}.tgz" \
            --tag win32-x64 \
            --access public \
            --provenance \
            --registry https://registry.npmjs.org/

      - name: Publish root package
        shell: bash
        env:
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          npm publish "./dist/kiri-npm-${VERSION}.tgz" \
            --access public \
            --provenance \
            --registry https://registry.npmjs.org/
