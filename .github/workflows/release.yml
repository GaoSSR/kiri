name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS first: Kiri currently has a real collector only on macOS.
          # Add Linux and Windows after their platform collectors are implemented.
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-15-intel

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Test
        run: cargo test

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin ports

      - name: Package archive
        shell: bash
        run: |
          set -euo pipefail

          archive="kiri-${{ matrix.target }}"
          staging="dist/${archive}"

          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/ports" "${staging}/ports"
          cp README.md "${staging}/README.md"
          if [ -f LICENSE ]; then
            cp LICENSE "${staging}/LICENSE"
          fi

          tar -czf "dist/${archive}.tar.gz" -C "${staging}" .
          shasum -a 256 "dist/${archive}.tar.gz" | sed 's#dist/##' > "dist/${archive}.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/kiri-${{ matrix.target }}.tar.gz
            dist/kiri-${{ matrix.target }}.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build-macos

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Generate combined checksums
        shell: bash
        run: |
          set -euo pipefail
          cat dist/*.sha256 > dist/checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          files: |
            dist/kiri-*.tar.gz
            dist/checksums.txt
