name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
            archive: tar
            binary: ports
          - target: x86_64-apple-darwin
            runner: macos-15-intel
            archive: tar
            binary: ports
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-latest
            archive: tar
            binary: ports
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            archive: zip
            binary: ports.exe

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Install Linux musl toolchain
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools

      - name: Test
        run: cargo test

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }} --bin ports

      - name: Package tar archive
        if: matrix.archive == 'tar'
        shell: bash
        run: |
          set -euo pipefail

          archive="kiri-${{ matrix.target }}"
          staging="dist/${archive}"

          mkdir -p "${staging}"
          cp "target/${{ matrix.target }}/release/ports" "${staging}/ports"
          cp README.md "${staging}/README.md"
          if [ -f LICENSE ]; then
            cp LICENSE "${staging}/LICENSE"
          fi

          tar -czf "dist/${archive}.tar.gz" -C "${staging}" .
          shasum -a 256 "dist/${archive}.tar.gz" | sed 's#dist/##' > "dist/${archive}.sha256"

      - name: Package Windows archive
        if: matrix.archive == 'zip'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $archive = "kiri-${{ matrix.target }}"
          $staging = "dist/$archive"

          New-Item -ItemType Directory -Force -Path $staging | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" "$staging/ports.exe"
          Copy-Item README.md "$staging/README.md"
          if (Test-Path LICENSE) {
            Copy-Item LICENSE "$staging/LICENSE"
          }

          Compress-Archive -Path "$staging/*" -DestinationPath "dist/$archive.zip" -Force
          $hash = (Get-FileHash "dist/$archive.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          "$hash  $archive.zip" | Set-Content "dist/$archive.sha256"

      - name: Upload build artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: release-${{ matrix.target }}
          path: |
            dist/kiri-${{ matrix.target }}.tar.gz
            dist/kiri-${{ matrix.target }}.zip
            dist/kiri-${{ matrix.target }}.sha256
          if-no-files-found: error

  publish-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24

      - name: Check release notes generator
        run: |
          node --check scripts/generate-release-notes.js
          node --test scripts/generate-release-notes.test.js

      - name: Download build artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: release-*
          path: dist
          merge-multiple: true

      - name: Check npm packaging
        run: |
          npm --prefix packaging/npm run check
          npm --prefix packaging/npm run test

      - name: Build npm tarballs
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          node packaging/npm/scripts/build-packages.js \
            --version "${version}" \
            --release-dir dist \
            --output-dir dist/npm

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          previous_tag="$(git tag --sort=-v:refname | awk -v current="${GITHUB_REF_NAME}" '$0 != current { print; exit }')"
          args=(
            scripts/generate-release-notes.js
            --version "${version}"
            --changelog CHANGELOG.md
            --output dist/release-notes.md
            --repo "${GITHUB_REPOSITORY}"
          )
          if [ -n "${previous_tag}" ]; then
            args+=(--previous-tag "${previous_tag}")
          fi
          node "${args[@]}"

      - name: Generate combined checksums
        shell: bash
        run: |
          set -euo pipefail
          awk '{ sub(/\r$/, ""); print }' dist/*.sha256 > dist/checksums.txt
          shasum -a 256 dist/npm/*.tgz | sed 's#dist/npm/##' >> dist/checksums.txt

      - name: Upload release assets
        uses: softprops/action-gh-release@v3.0.0
        with:
          body_path: dist/release-notes.md
          files: |
            dist/kiri-*.tar.gz
            dist/kiri-*.zip
            dist/npm/*.tgz
            dist/checksums.txt
